server.port=8080
server.address=0.0.0.0
server.forward-headers-strategy=framework
server.shutdown=graceful

server.compression.enabled=true
server.compression.min-response-size=${SERVER_COMPRESSION_MIN_RESPONSE_SIZE:512B}
server.compression.mime-types=application/json,text/plain,text/html,text/css,application/javascript

server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:200}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
server.tomcat.max-connections=${SERVER_TOMCAT_MAX_CONNECTIONS:8192}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:200}
server.tomcat.connection-timeout=${SERVER_TOMCAT_CONNECTION_TIMEOUT:10s}
server.tomcat.keep-alive-timeout=${SERVER_TOMCAT_KEEP_ALIVE_TIMEOUT:30s}
server.tomcat.max-keep-alive-requests=${SERVER_TOMCAT_MAX_KEEP_ALIVE_REQUESTS:100}

spring.lifecycle.timeout-per-shutdown-phase=${SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE:20s}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/campus_network_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:3000}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=${APP_TICKET_QUEUE_REDIS_ENABLED:false}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:2000ms}
spring.data.redis.repositories.enabled=false

app.ticket-queue.redis.enabled=${APP_TICKET_QUEUE_REDIS_ENABLED:false}
app.ticket-queue.redis.stream-key=${APP_TICKET_QUEUE_REDIS_STREAM_KEY:tickets:created}
app.ticket-queue.redis.max-len=${APP_TICKET_QUEUE_REDIS_MAX_LEN:10000}
